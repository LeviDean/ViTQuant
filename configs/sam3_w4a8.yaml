# SAM3 W4A8, naive-PTQ production baseline (server/GPU). Pair with
# sam3_w4a8_advanced.yaml — same data/protocol, only the algorithms differ.
# See configs/sam3.yaml for how to fetch the gated facebook/sam3 weights.
model:
  family: sam3
  name: facebook/sam3
  checkpoint: weights/sam3

data:
  root: data
  download: false           # server: data pre-copied
  calib_samples: 32         # PE ViT-L backbone at 1008² is ~3.5x SAM1 ViT-B compute
  eval_samples: 64
  prompt_grid: 4

quant:
  weight: {bits: 4, symmetric: true, per_channel: true, observer: minmax}
  activation: {bits: 8, symmetric: false, per_channel: false, observer: moving_avg}

device: auto
output_dir: outputs/sam3_w4a8_baseline
