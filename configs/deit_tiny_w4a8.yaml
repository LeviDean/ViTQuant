# W4A8 variant: 4-bit weights, 8-bit activations. Simulated accuracy is fully
# real (custom kernel); the real-deployment ORT delivery still exports/quantizes
# W4A8 for real size numbers, but ORT's CPU EP has no int4 matmul kernel, so the
# latency numbers do not reflect a real hardware speedup (see report note).
model:
  name: deit_tiny_patch16_224
  checkpoint: weights/deit_tiny_patch16_224.pth

data:
  root: data
  download: true
  batch_size: 64
  num_workers: 4
  calib_images: 256
  calib_batch_size: 32

quant:
  weight: {bits: 4, symmetric: true, per_channel: true, observer: minmax}
  activation: {bits: 8, symmetric: false, per_channel: false, observer: moving_avg}

eval:
  max_batches: null

benchmark:
  runs: 50
  warmup: 10

device: auto
output_dir: outputs/deit_tiny_w4a8
