# W4A8 variant: 4-bit weights, 8-bit activations. Measures the accuracy cost of
# dropping weights to 4-bit (relevant for edge NPUs that prefer 4-bit weights).
# The custom fake-quant kernel handles any bit-width, so this is a config-only
# change from the W8A8 default.
model:
  name: deit_tiny_patch16_224
  checkpoint: weights/deit_tiny_patch16_224.pth

data:
  root: data
  download: true
  batch_size: 64
  num_workers: 4
  calib_images: 256
  calib_batch_size: 32

quant:
  weight: {bits: 4, symmetric: true, per_channel: true, observer: minmax}
  activation: {bits: 8, symmetric: false, per_channel: false, observer: moving_avg}

eval:
  max_batches: null

device: auto
output_dir: outputs/deit_tiny_w4a8
